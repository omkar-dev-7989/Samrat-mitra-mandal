<svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7DC6F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Crown at top -->
  <path d="M 20 15 L 30 5 L 40 8 L 50 2 L 60 8 L 70 2 L 80 8 L 90 5 L 100 15 L 95 25 L 25 25 Z" fill="url(#goldGradient)" stroke="#6B3F2E" stroke-width="2"/>
  
  <!-- Crown details -->
  <circle cx="30" cy="5" r="2" fill="#6B3F2E"/>
  <circle cx="50" cy="2" r="2" fill="#6B3F2E"/>
  <circle cx="70" cy="2" r="2" fill="#6B3F2E"/>
  <circle cx="90" cy="5" r="2" fill="#6B3F2E"/>
  
  <!-- Shield background -->
  <path d="M 25 25 L 95 25 L 95 80 Q 60 110 25 80 Z" fill="url(#goldGradient)" stroke="#6B3F2E" stroke-width="2.5"/>
  
  <!-- Central sword -->
  <g transform="translate(60, 40)">
    <!-- Sword blade (silver) -->
    <polygon points="0,-30 -6,15 0,20 6,15" fill="#D3D3D3" stroke="#808080" stroke-width="1"/>
    <!-- Sword handle (brown) -->
    <rect x="-4" y="15" width="8" height="18" fill="#8B4513" stroke="#654321" stroke-width="1"/>
    <!-- Cross guard -->
    <rect x="-12" y="32" width="24" height="3" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  </g>
  
  <!-- Orange flag on right -->
  <g transform="translate(80, 35)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#6B3F2E" stroke-width="1.5"/>
    <path d="M 2 3 Q 16 0 16 12 Q 16 24 2 20 Z" fill="#FF8C00" stroke="#FF6B00" stroke-width="0.8"/>
  </g>
</svg>
